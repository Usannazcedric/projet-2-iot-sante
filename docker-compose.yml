services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: ehpad-mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config:/mosquitto/config:ro
      - mosquitto-data:/mosquitto/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -h localhost -t '$$SYS/#' -C 1 -E -i healthcheck -W 3"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  redis:
    image: redis:7-alpine
    container_name: ehpad-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 3s

  influxdb:
    image: influxdb:2.7
    container_name: ehpad-influxdb
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUX_USERNAME:-admin}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUX_PASSWORD:-ehpad-admin}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUX_ORG:-ehpad}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUX_BUCKET:-ehpad_vitals}
      DOCKER_INFLUXDB_INIT_RETENTION: 720h
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUX_ADMIN_TOKEN:-ehpad-token-dev}
    volumes:
      - influx-data:/var/lib/influxdb2
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  simulator:
    build: ./simulator
    container_name: ehpad-simulator
    ports:
      - "9100:9100"
    depends_on:
      mosquitto:
        condition: service_healthy
    environment:
      MQTT_HOST: mosquitto
      MQTT_PORT: 1883
      API_PORT: 9100
      RESIDENT_COUNT: 20
      DEMO_MODE: "true"
      LOG_LEVEL: INFO
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9100/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  backend:
    build: ./backend
    container_name: ehpad-backend
    ports:
      - "8000:8000"
    depends_on:
      mosquitto: { condition: service_healthy }
      redis:     { condition: service_healthy }
      influxdb:  { condition: service_healthy }
    environment:
      MQTT_HOST: mosquitto
      MQTT_PORT: 1883
      REDIS_URL: redis://redis:6379
      INFLUX_URL: http://influxdb:8086
      INFLUX_TOKEN: ehpad-token-dev
      INFLUX_ORG: ehpad
      INFLUX_BUCKET: ehpad_vitals
      LOG_LEVEL: INFO
      DEMO_MODE: "true"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  mosquitto-data:
  redis-data:
  influx-data:
